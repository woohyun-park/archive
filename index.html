<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="style.css">
  <script src="index.js"></script>
  <title>Document</title>
</head>
<body>
  <container>
    <nav>
      <div class="nav__box">
        <span class="nav__title">[archive]</span>
        <span class="nav__title" onclick="moveBottom(0);">[cinema]</span>
        <span class="nav__title" onclick="moveBottom(1);">[music]</span>
        <span class="nav__title" onclick="moveBottom(2);">[fashion]</span>
      </div>
      <div class="nav__menu">=</div>
    </nav>
    <main id="main">
      <div class="main__page">
        <div class="main__right" onclick="moveRight(this);">&#62;</div>
        <div class="main__title" onclick="moveTop(this, 1);">
          <span class="main__open">[</span>
          <div class="main__box">
            <span class="main__alphabet">cinema</span>
          </div>
          <span class="main__close">]</span>
        </div>
      </div>
      <div class="main__page">
        <div class="main__left" onclick="moveLeft(this);">&#60;</div>
        <div class="main__right" onclick="moveRight(this);">&#62</div>
        <div class="main__title" onclick="moveTop(this, 2);">
          <span class="main__open">[</span>
          <div class="main__box">
            <span class="main__alphabet">music</span>
          </div>
          <span class="main__close">]</span>
        </div>
      </div>
      <div class="main__page">
        <div class="main__left" onclick="moveLeft(this);">&#60;</div>
        <div class="main__title" onclick="moveTop(this, 3);">
          <span class="main__open">[</span>
          <div class="main__box">
            <span class="main__alphabet">fashion</span>
          </div>
          <span class="main__close">]</span>
        </div>
      </div>
      <div class="main__content">
      </div>
      <div class="main__content">
        <div class="main__box">
          <img src=".\tab\music\img\1.jpg" onclick=showContent(this.parentNode)>
          <span class="main__type">c</span>
          <object width="90%" height="500px" type="text/html" data=".\tab\music\text\1.html" border="0"></object>
        </div>
        <div class="main__box">
          <img src=".\tab\music\img\2.jpg" onclick=showContent(this.parentNode)>
          <span class="main__type">c</span>
          <object width="90%" height="500px" type="text/html" data=".\tab\music\text\2.html" border="0"></object>
        </div>
        <div class="main__box">
          <img src=".\tab\music\img\3.jpg" onclick=showContent(this.parentNode)>
          <span class="main__type">c</span>
          <object width="90%" height="500px" type="text/html" data=".\tab\music\text\3.html" border="0"></object>
        </div>
      </div>
      <div class="main__content">
      </div>
      <div class="main__crud">
        <div class="main__create">+</div>
      </div>
    </main>
    <footer>
    </footer>
