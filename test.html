<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <style>
    #smoothScroll {
      height: 100vh; overflow:auto; scroll-snap-type: y mandatory; transition: 5s;
    }
    #smoothScroll>section {
      padding: 10px; height: 100%; scroll-snap-align: start; transition: 5s;
    }
    #smoothScroll>section:nth-child(3n+1){background:gold;transition: 5s;}
    #smoothScroll>section:nth-child(3n+2){background:skyblue;transition: 5s;}
    #smoothScroll>section:nth-child(3n){background:pink;transition: 5s;}
  </style>
</head>
<body>
<div id="smoothScroll">
  <section>
  </section>
  <section>
  </section>
  <section>
  </section>
  <section>
  </section>
  <section>
  </section>
  <section>
  </section>
  <section>
  </section>
  <section>
  </section>
  <section>
  </section>
  <section>
  </section>
</div>
</body>
</html>
